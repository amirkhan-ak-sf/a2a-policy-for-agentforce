---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: Extension
metadata:
  labels:
    title: Agentforce API to A2A
    description: |
      Wraps the Salesforce Agentforce Agents API as an A2A 0.3.0 JSON-RPC
      server. Exposes /.well-known/agent-card.json and translates A2A
      message/send + tasks/get + tasks/cancel into Agentforce
      startSession / sendMessage / endSession.
    category: AI
    metadata/interfaceScope: api,resource
    metadata/capabilities/injectionPoint: inbound
spec:
  extends:
    - name: extension-definition
      namespace: default
  properties:
    # ---------------------------------------------------------------------
    # Agentforce: connected app + endpoints
    # ---------------------------------------------------------------------
    myDomainUrl:
      type: string
      format: service
      description: |
        Your Salesforce My Domain URL, e.g. https://acme.my.salesforce.com.
        The OAuth /services/oauth2/token endpoint is reached at
        <myDomainUrl>/services/oauth2/token. Registered as an Envoy
        upstream cluster at deploy time.
    agentforceApiUrl:
      type: string
      format: service
      default: https://api.salesforce.com
      description: |
        Host-only base URL of the Agentforce Agents API. Registered as
        an Envoy upstream cluster, so it MUST be host-only (no path
        component). The API path prefix is provided separately via
        `agentforceApiBasePath`. We split host and path because some
        Flex Gateway runtime modes register path-bearing service URLs
        as upstream clusters in a way that traps WASM outbound calls.
    agentforceApiBasePath:
      type: string
      default: /einstein/ai-agent/v1
      description: |
        Path prefix to append to all Agentforce REST calls. Combined
        with `agentforceApiUrl` to form the full request path. Defaults
        to the public Agentforce v1 surface; override for sandbox
        endpoints.
    consumerKey:
      type: string
      description: |
        External Connected App consumer key (OAuth client_id) configured
        with the Client Credentials Flow.
    consumerSecret:
      type: string
      format: password
      description: External Connected App consumer secret (OAuth client_secret).
    agentforceAccessTokenOverride:
      type: string
      format: password
      default: ""
      description: |
        Optional diagnostic override. When set, the policy skips the
        Salesforce OAuth client_credentials exchange and uses this bearer
        token for Agentforce calls. Leave blank for normal operation.
    agentId:
      type: string
      description: |
        Salesforce Agentforce agent id, used in
        POST /agents/{agentId}/sessions. Found in the URL of the agent's
        details page in Setup.
    bypassUser:
      type: boolean
      default: true
      description: |
        Agentforce bypassUser flag. true uses the agent-assigned user
        (correct for client_credentials flows); false uses the user
        associated with the access token.
    cacheSafetyMarginSeconds:
      type: integer
      minimum: 0
      maximum: 600
      default: 60
      description: Refresh the OAuth access token this many seconds before expires_in.

    # ---------------------------------------------------------------------
    # A2A protocol
    # ---------------------------------------------------------------------
    protocolVersion:
      type: string
      enum:
        - 0.3.0
      default: 0.3.0
      description: |
        A2A protocol version implemented by this policy. Currently only
        0.3.0 is supported; 1.0.0 will be added when the spec ships.
    a2aRpcPath:
      type: string
      default: /
      description: |
        Relative path under the governed API where JSON-RPC requests are
        accepted. Defaults to /. The agent card is always served at
        <base>/.well-known/agent-card.json regardless of this value.
    publicBaseUrl:
      type: string
      description: |
        Externally reachable base URL of the governed A2A endpoint, used
        to populate AgentCard.url. The policy overrides whatever 'url'
        the operator-supplied agent card declares so it cannot lie about
        where it is hosted.
    strictMode:
      type: boolean
      default: false
      description: |
        When true, requests that do not match the A2A surface
        (agent-card.json or POST <a2aRpcPath>) are short-circuited with a
        404. When false, non-A2A requests are forwarded to the upstream.

    # ---------------------------------------------------------------------
    # Task state cache (per-replica, in-memory)
    # ---------------------------------------------------------------------
    # OS v2 persistence has been removed for now — task state lives only
    # in the per-replica PDK in-memory cache. tasks/get for a task that
    # landed on a different replica or aged past the TTL returns
    # "Task not found".
    taskHotCacheTtlSeconds:
      type: integer
      minimum: 0
      maximum: 3600
      default: 60
      description: |
        TTL (seconds) for the per-replica PDK in-memory task cache. Tasks
        younger than this are returned by tasks/get on the replica that
        served message/send; older tasks are reported as not found.

    # ---------------------------------------------------------------------
    # Agent card configuration. Operator picks one of four sources and
    # provides the matching field. agentCardOverrideJson is deep-merged
    # on top of the resolved card so individual fields can be overridden.
    # ---------------------------------------------------------------------
    agentCardSource:
      type: string
      enum:
        - inline_json
        - url
        - structured
        - file
      default: structured
      description: |
        How the AgentCard is supplied:
          inline_json - paste a complete card into agentCardJson.
          url         - fetched once at policy load from agentCardUrl.
          structured  - common fields filled in via the structured form.
          file        - paste the contents of agent-card.json into
                        agentCardJson (the API Manager UI has no file
                        upload widget; documented in home.md).
    agentCardJson:
      type: string
      default: ""
      description: |
        Complete AgentCard JSON, used when agentCardSource is 'inline_json'
        or 'file'. Validated at policy load time.
    agentCardUrl:
      type: string
      format: service
      description: |
        URL the policy fetches the AgentCard JSON from. Used when
        agentCardSource is 'url'. Registered as an Envoy upstream cluster
        and fetched lazily on the first /.well-known/agent-card.json
        request, then cached in memory for the life of the policy.
        Redeploy the policy to refresh.
    agentCardName:
      type: string
      default: ""
      description: AgentCard.name (structured mode).
    agentCardDescription:
      type: string
      default: ""
      description: AgentCard.description (structured mode).
    agentCardVersion:
      type: string
      default: "1.0.0"
      description: AgentCard.version (structured mode).
    agentCardIconUrl:
      type: string
      default: ""
      description: AgentCard.iconUrl (structured mode).
    agentCardDocumentationUrl:
      type: string
      default: ""
      description: AgentCard.documentationUrl (structured mode).
    agentCardProviderOrganization:
      type: string
      default: ""
      description: |
        AgentCard.provider.organization (structured mode). A2A 0.3.0 §5.5
        requires AgentProvider to carry both organization and url, so
        this must be set together with agentCardProviderUrl. Leave both
        blank to omit the provider block entirely.
    agentCardProviderUrl:
      type: string
      default: ""
      description: |
        AgentCard.provider.url (structured mode). Must be set together
        with agentCardProviderOrganization (A2A 0.3.0 §5.5).
    agentCardCapabilitiesStreaming:
      type: boolean
      default: false
      description: AgentCard.capabilities.streaming (structured mode). v1 always advertises false.
    agentCardCapabilitiesPushNotifications:
      type: boolean
      default: false
      description: AgentCard.capabilities.pushNotifications (structured mode). v1 always advertises false.
    agentCardDefaultInputModes:
      type: string
      default: "text/plain"
      description: |
        Comma-separated AgentCard.defaultInputModes (structured mode).
        Defaults to 'text/plain'.
    agentCardDefaultOutputModes:
      type: string
      default: "text/plain"
      description: |
        Comma-separated AgentCard.defaultOutputModes (structured mode).
        Defaults to 'text/plain'.
    agentCardSkills:
      type: array
      default: []
      description: |
        AgentCard.skills (structured mode). Click "Add" to add a skill
        and fill in id, name, description, and tags. Each row is emitted
        as one object in the `skills` array of the agent-card.json
        served at `/.well-known/agent-card.json`.
      items:
        type: object
        required:
          - id
          - name
          - description
        properties:
          id:
            type: string
            description: |
              Stable identifier for the skill (e.g. `inventory-check`).
          name:
            type: string
            description: Human-readable skill name (e.g. "Inventory check").
          description:
            type: string
            description: |
              Short sentence describing what the skill does (e.g.
              "Ask about MULETEST product availability").
          tags:
            type: array
            default: []
            description: |
              Free-form tags for grouping skills (e.g.
              ["agentforce", "inventory"]). Optional.
            items:
              type: string
    agentCardSecuritySchemesJson:
      type: string
      default: ""
      description: |
        Optional JSON object for AgentCard.securitySchemes (structured
        mode). Follows the OpenAPI 3.0 Security Scheme Object shape.
    agentCardOverrideJson:
      type: string
      default: ""
      description: |
        Optional JSON object that is deep-merged on top of the
        agent card resolved from the chosen source. Useful for
        overriding a single field (e.g. extra securitySchemes) without
        rewriting the whole card.

    # ---------------------------------------------------------------------
    # Anypoint Exchange asset publication (opt-in)
    # ---------------------------------------------------------------------
    # When enabled, the resolved agent-card.json is published as a new
    # version of an existing Exchange `agent` asset on the first request
    # that lands on each replica after policy load. Failures log at warn
    # and never block traffic. See docs/operator-runbook for setup.
    publishAgentCardToExchange:
      type: boolean
      default: false
      description: |
        When true, the policy POSTs the resolved agent-card.json to the
        Exchange asset identified by `exchangeAssetGroupId` /
        `exchangeAssetId` on the first inbound request after policy load.
        The version published is `<agentCardVersion>-<sha256-prefix>` so
        re-applying the same config is idempotent (Exchange returns 409
        on a repeat and the policy treats it as success).
    exchangeBaseUrl:
      type: string
      format: service
      default: https://anypoint.mulesoft.com
      description: |
        Anypoint Exchange host. Registered as an Envoy upstream cluster.
        Override only for EU / sovereign cloud or air-gapped tenants.
    anypointTokenUrl:
      type: string
      format: service
      default: https://anypoint.mulesoft.com/accounts/api/v2/oauth2/token
      description: |
        Anypoint platform OAuth token endpoint used to mint the bearer
        for the Exchange publish call.
    anypointClientId:
      type: string
      default: ""
      description: |
        Connected-app client_id with the `Exchange Contributor` role on
        the target asset. Required when `publishAgentCardToExchange` is
        true.
    anypointClientSecret:
      type: string
      format: password
      default: ""
      description: |
        Connected-app client_secret matching `anypointClientId`. Required
        when `publishAgentCardToExchange` is true.
    anypointOrgId:
      type: string
      default: ""
      description: |
        UUID of the Anypoint organization that owns the Exchange asset.
        Required when `publishAgentCardToExchange` is true.
    exchangeAssetGroupId:
      type: string
      default: ""
      description: |
        groupId of the existing Exchange agent asset. Leave blank to use
        `anypointOrgId` (Exchange uses the org UUID as the groupId for
        org-private assets, the common case).
    exchangeAssetId:
      type: string
      default: ""
      description: |
        assetId of the existing Exchange `agent` asset (e.g.
        "sales-order-mgmt"). The asset must already exist; the policy
        adds a new version per apply. Required when
        `publishAgentCardToExchange` is true.

    diagnosticPreBodyProbe:
      type: boolean
      default: false
      description: |
        Diagnostic only. When true, the policy issues a probe outbound
        HTTPS call to myDomainUrl BEFORE transitioning to the request
        body state, then continues with the normal flow. Used to test
        whether connected-mode runtime breaks outbound HTTPS only after
        the request body has been read. Leave false in production.
    diagnosticPreBodyAgentforceProbe:
      type: boolean
      default: false
      description: |
        Diagnostic only. When true, the policy issues a probe outbound
        call to the Agentforce API (start_session) in the request
        headers state, before reading the body. Used to test whether
        the connected-mode trap is host-specific to the Agentforce
        upstream cluster, or whether the trap requires the
        post-body-state context. Leave false in production.
    diagnosticContinueFlow:
      type: boolean
      default: false
      description: |
        Diagnostic only. When true, the policy still performs all
        outbound calls and builds the A2A response Task, but returns
        Flow::Continue at the end of message/send instead of short-
        circuiting with Flow::Break. The upstream then sees the original
        request and the policy's synthetic response is discarded. Used
        to test whether connected-mode runtime breaks specifically when
        Flow::Break follows outbound HTTPS calls. Leave false in
        production.
  required:
    - myDomainUrl
    - agentforceApiUrl
    - consumerKey
    - consumerSecret
    - agentId
    - publicBaseUrl
